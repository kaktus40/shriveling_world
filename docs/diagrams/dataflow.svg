<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <style>
    .box { fill:#0b2b2b; stroke:#59c4bf; stroke-width:2; rx:8; }
    .small { font:12px/1.1rem sans-serif; fill:#cde; }
    .title { font:14px/1.1rem sans-serif; fill:#fff; font-weight:600; }
    .arrow { stroke:#59c4bf; stroke-width:2; fill:none; marker-end:url(#arrowhead);} 
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#59c4bf" />
    </marker>
  </defs>

  <!-- Left column: data ingestion -->
  <rect class="box" x="30" y="30" width="220" height="80" />
  <text x="40" y="54" class="title">Fichiers source</text>
  <text x="40" y="74" class="small">CSV / GeoJSON (text)</text>

  <rect class="box" x="30" y="130" width="220" height="80" />
  <text x="40" y="154" class="title">prepareDataset</text>
  <text x="40" y="174" class="small">PreparedDataset → cities, edges (rad, meters)</text>

  <!-- Center column: compute pipeline -->
  <rect class="box" x="320" y="30" width="240" height="80" />
  <text x="330" y="54" class="title">staticTown</text>
  <text x="330" y="74" class="small">cityNED→ECEF matrices (Float32Array, meters)</text>

  <rect class="box" x="320" y="130" width="240" height="80" />
  <text x="330" y="154" class="title">dynamicTown (year)</text>
  <text x="330" y="174" class="small">roadAlphaRadians + link lists (radians / indexes)</text>

  <rect class="box" x="320" y="230" width="240" height="80" />
  <text x="330" y="254" class="title">rawCones</text>
  <text x="330" y="274" class="small">coneAlphaRadians (rad), rawConeRimEcef (Float32Array, meters)</text>

  <rect class="box" x="320" y="330" width="240" height="80" />
  <text x="330" y="354" class="title">coneIntersections</text>
  <text x="330" y="374" class="small">ciseledConeRimEcef (Float32Array, meters), distances</text>

  <rect class="box" x="320" y="430" width="240" height="80" />
  <text x="330" y="454" class="title">finalCones</text>
  <text x="330" y="474" class="small">finalConeGeometryEcef (Float32Array vec4, meters)</text>

  <!-- Right column: render -->
  <rect class="box" x="760" y="110" width="320" height="120" />
  <text x="770" y="134" class="title">buildAppConeMeshDescriptors</text>
  <text x="770" y="154" class="small">consume finalConeGeometryEcef → per-city rimPoints</text>
  <text x="770" y="174" class="small">output: AppConeMeshDescriptor[]</text>

  <rect class="box" x="760" y="270" width="320" height="120" />
  <text x="770" y="294" class="title">createAppConeMeshController</text>
  <text x="770" y="314" class="small">VertexData.applyToMesh / updateVerticesData</text>
  <text x="770" y="334" class="small">Babylon Meshes bound to positions/normals (meters → app-scale)</text>

  <rect class="box" x="760" y="430" width="320" height="80" />
  <text x="770" y="454" class="title">Render loop</text>
  <text x="770" y="474" class="small">scene.render() → frame display</text>

  <!-- Arrows -->
  <path class="arrow" d="M250 70 L320 70"/>
  <path class="arrow" d="M250 170 L320 170"/>
  <path class="arrow" d="M560 70 L760 170"/>
  <path class="arrow" d="M560 170 L760 210"/>
  <path class="arrow" d="M560 270 L760 250"/>
  <path class="arrow" d="M560 370 L760 290"/>
  <path class="arrow" d="M560 470 L760 330"/>

  <!-- double-buffer / worker legend -->
  <rect x="40" y="540" width="18" height="18" fill="#0b2b2b" stroke="#f1c40f" stroke-width="2" rx="4"/>
  <text x="68" y="555" class="small">Double-buffered GPU/WebGL outputs (.back written, swap → .front)</text>
  <rect x="40" y="570" width="18" height="18" fill="#0b2b2b" stroke="#9b59b6" stroke-width="2" rx="4"/>
  <text x="68" y="585" class="small">Worker / in-process compute (CPU-heavy steps)</text>

</svg>