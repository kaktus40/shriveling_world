<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Construction d'une fenetre de recherche consciente d'alpha</title>
  <desc id="desc">Le couloir symetrique est enrichi par les zones rapides proches, tandis que les autres zones sont traitees comme blocs avec borne conservatrice.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#203040"/></marker>
    <style>
      .title{font:700 25px Georgia,serif;fill:#203040}.head{font:700 19px Georgia,serif;fill:#203040}.label{font:16px Georgia,serif;fill:#405468}.box{fill:#fffaf0;stroke:#d6c7ad;stroke-width:2}.safe{fill:#e6f2eb;stroke:#14866d;stroke-width:3}.warn{fill:#fff1dc;stroke:#d45b24;stroke-width:3}.line{stroke:#203040;stroke-width:3;marker-end:url(#arrow)}.road{fill:#aab6bb}.fast{fill:#d45b24}.priority{fill:#e9b44c}
    </style>
  </defs>
  <rect width="1200" height="680" fill="#f7f2e8"/>
  <text x="42" y="48" class="title">Fenetre prioritaire et elimination garantie</text>
  <rect x="50" y="100" width="300" height="115" rx="12" class="box"/>
  <text x="75" y="135" class="head">1. Couloir de base</text>
  <text x="75" y="168" class="label">intervalle court phiB0 vers gammaBA</text>
  <text x="75" y="194" class="label">+ faces contenant ses bornes</text>
  <line x1="350" y1="157" x2="430" y2="157" class="line"/>
  <rect x="430" y="100" width="320" height="115" rx="12" class="box"/>
  <text x="455" y="135" class="head">2. Ajouter les zones rapides</text>
  <text x="455" y="168" class="label">supports alpha &lt; roadAlpha proches</text>
  <text x="455" y="194" class="label">ou chevauchant le couloir</text>
  <line x1="750" y1="157" x2="830" y2="157" class="line"/>
  <rect x="830" y="100" width="320" height="115" rx="12" class="safe"/>
  <text x="855" y="135" class="head">3. Trier les blocs</text>
  <text x="855" y="168" class="label">par blockEntryT croissant</text>
  <text x="855" y="194" class="label">et non par gauche/droite seul</text>

  <text x="50" y="285" class="head">Domaine circulaire de B, deroule pour le raisonnement</text>
  <rect x="50" y="330" width="1100" height="74" rx="12" fill="#e5e9e8" stroke="#9aa8ae" stroke-width="2"/>
  <rect x="130" y="330" width="125" height="74" class="fast"/>
  <rect x="380" y="330" width="330" height="74" class="priority"/>
  <rect x="610" y="330" width="180" height="74" class="fast" opacity=".86"/>
  <rect x="970" y="330" width="90" height="74" class="fast"/>
  <text x="80" y="375" class="label">Road</text><text x="145" y="375" class="label" fill="#fff">rapide eloignee</text>
  <text x="450" y="375" class="label">couloir symetrique</text><text x="635" y="375" class="label" fill="#fff">rapide proche</text>
  <text x="975" y="375" class="label" fill="#fff">rapide</text>
  <line x1="440" y1="315" x2="440" y2="420" stroke="#203040" stroke-width="3"/><text x="400" y="445" class="label">phiB0</text>
  <line x1="690" y1="315" x2="690" y2="420" stroke="#203040" stroke-width="3"/><text x="660" y="445" class="label">gammaBA</text>

  <rect x="50" y="500" width="500" height="120" rx="12" class="warn"/>
  <text x="75" y="535" class="head">Ordre heuristique</text>
  <text x="75" y="568" class="label">Visiter d'abord le couloir enrichi par les zones rapides.</text>
  <text x="75" y="594" class="label">Les zones Road contigues peuvent former de grands blocs.</text>
  <rect x="650" y="500" width="500" height="120" rx="12" class="safe"/>
  <text x="675" y="535" class="head">Reduction sure de la fourchette</text>
  <text x="675" y="568" class="label">Rejeter uniquement un bloc dont blockEntryT &gt;= bestT.</text>
  <text x="675" y="594" class="label">Une zone rapide eloignee reste candidate tant que sa borne gagne.</text>
</svg>
