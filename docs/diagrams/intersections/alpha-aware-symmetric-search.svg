<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Rayon symetrique et parcours prioritaire autour de la ville B</title>
  <desc id="desc">Vue schematique de A, B, du plan A-B-centre Terre, du rayon symetrique phiB0 et de la zone de recherche prioritaire.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#203040"/></marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d45b24"/></marker>
    <style>
      .label{font:18px Georgia,serif;fill:#203040}.small{font:15px Georgia,serif;fill:#405468}.axis{stroke:#7b8994;stroke-width:2;stroke-dasharray:8 7}.ray{stroke:#203040;stroke-width:4;marker-end:url(#arrow)}.priority{fill:none;stroke:#d45b24;stroke-width:12;stroke-linecap:round;marker-end:url(#arrowOrange)}.secondary{fill:none;stroke:#8aa0aa;stroke-width:7;stroke-dasharray:10 8}.town{fill:#f4b942;stroke:#203040;stroke-width:3}.influence{stroke:#14866d;stroke-width:5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="620" fill="#f7f2e8"/>
  <text x="42" y="48" class="label" font-weight="bold">Cas d'etude: recherche autour du cone B</text>
  <circle cx="590" cy="330" r="225" fill="#e9f0ed" stroke="#b5c5bf" stroke-width="2"/>
  <line x1="590" y1="330" x2="285" y2="330" class="axis"/>
  <text x="315" y="315" class="small">plan A-B-centre Terre</text>
  <circle cx="240" cy="330" r="13" class="town"/><text x="212" y="370" class="label">A</text>
  <circle cx="590" cy="330" r="15" class="town"/><text x="607" y="354" class="label">B</text>
  <line x1="240" y1="330" x2="395" y2="175" class="ray"/>
  <text x="255" y="190" class="small">rayon considere de A</text>
  <line x1="590" y1="330" x2="420" y2="185" class="ray"/>
  <text x="390" y="153" class="label">phiB0</text>
  <line x1="590" y1="330" x2="350" y2="330" class="ray"/>
  <text x="420" y="360" class="label">gammaBA</text>
  <path d="M 424 189 A 225 225 0 0 0 365 330" class="priority"/>
  <text x="285" y="235" class="label" fill="#d45b24">zone prioritaire</text>
  <path d="M 365 330 A 225 225 0 1 0 424 189" class="secondary"/>
  <text x="680" y="520" class="small">cote oppose: visite seulement si sa borne</text>
  <text x="680" y="544" class="small">peut encore battre bestT</text>
  <line x1="590" y1="330" x2="705" y2="135" class="influence"/>
  <text x="706" y="112" class="small" fill="#14866d">rayon B avec alpha connu</text>
  <rect x="42" y="540" width="580" height="48" rx="8" fill="#fffaf0" stroke="#d6c7ad"/>
  <text x="60" y="570" class="small">L'ordre est heuristique; l'elimination exige blockEntryT >= bestT.</text>
</svg>
